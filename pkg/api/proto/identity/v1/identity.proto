syntax = "proto3";

package identity.v1;

option go_package = "github.com/k8shell-io/common/pkg/api/gen/go/identity/v1;identityv1";

import "common/v1/common.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";
import "identity/v1/types.proto";

// IdentityService provides operations for user management, authentication,
// onboarding, and external credential management.
service IdentityService {
  // FindUser retrieves a user by username. It can be used for authentication and user lookup.
  rpc FindUser (FindUserRequest) returns (common.v1.User);

  // GetUsers retrieves a list of users with pagination support.
  rpc GetUsers (GetUsersRequest) returns (UserList);

  // IssueUserToken issues a new JWT access token for a user
  rpc IssueUserToken (IssueUserTokenRequest) returns (IssueUserTokenResponse);

  // GetUserOnboardCapability checks if the identity provider supports onboarding and returns the capability details.
  rpc GetUserOnboardCapability (Username) returns (common.v1.UserOnboardCapability);

  // OnboardUserDeviceFlow initiates the device flow onboarding process for a user.
  rpc OnboardUserDeviceFlow (OnboardUserDeviceFlowRequest) returns (common.v1.OnboardUserDeviceFlow);

  // OnboardUserWebFlow initiates the web flow onboarding process for a user.
  rpc OnboardUserWebFlow (OnboardUserWebFlowRequest) returns (common.v1.OnboardUserWebFlow);

  // CompleteUserWebFlow completes the web flow onboarding process using the provided state and code.
  rpc CompleteUserWebFlow (CompleteUserWebFlowRequest) returns (CompleteUserWebFlowResponse);

  // AuthUserPublicKey authenticates a user using a public key and returns the authentication result
  // along with user details if valid.
  rpc AuthUserPublicKey (AuthUserPublicKeyRequest) returns (AuthUserResponse);

  // AuthUserPassword authenticates a user using a password stored locally (bcrypt-hashed)
  // and returns the authentication result along with user details if valid.
  rpc AuthUserPassword (AuthUserPasswordRequest) returns (AuthUserResponse);

  // VerifyUserPassword checks a password against a user's stored bcrypt hash without
  // evaluating the user:auth authz policy, unlike AuthUserPassword. It is intended for
  // callers that already gate password-verification requirements (e.g. requiring the
  // current password before a change) with their own authorization logic.
  rpc VerifyUserPassword (AuthUserPasswordRequest) returns (AuthUserResponse);

  // CompleteUserDeviceFlow is called by the client after the user has completed
  // device-flow authorization on the provider side. It provisions the git
  // credential and returns the user's access token.
  rpc CompleteUserDeviceFlow (CompleteUserDeviceFlowRequest) returns (CompleteUserDeviceFlowResponse);

  // GetBlueprintByUserStr retrieves a blueprint associated with a user string identifier.
  rpc GetBlueprintByUserStr (UserStr) returns (Blueprint);

  // ListUserCredentials retrieves all credentials associated with a user, or a single
  // credential when id is set.
  rpc ListUserCredentials (ListUserCredentialsRequest) returns (ListUserCredentialsResponse);

  // GetUserCredential retrieves a specific credential for a user by service name and scope.
  rpc GetUserCredential (GetUserCredentialRequest) returns (common.v1.UserCredential);

  // AddKubernetesUserCredential provisions a Kubernetes service-account credential for a user.
  // The secret is left unset — kubernetes credentials are resolved on demand via the
  // TokenRequest API when the credential is fetched.
  rpc AddKubernetesUserCredential (AddKubernetesUserCredentialRequest) returns (AddKubernetesUserCredentialResponse);

  // AddGitUserCredential stores a Git credential for a user. credential_source is always
  // "stored" — the secret is persisted as given and returned as-is on resolution.
  rpc AddGitUserCredential (AddGitUserCredentialRequest) returns (AddGitUserCredentialResponse);

  // AddRegistryUserCredential stores a container registry credential for a user.
  // credential_source is always "stored" — the secret is persisted as given and returned
  // as-is on resolution.
  rpc AddRegistryUserCredential (AddRegistryUserCredentialRequest) returns (AddRegistryUserCredentialResponse);

  // CreateUser creates a new local user record. The supplied password, if any,
  // is bcrypt-hashed server-side before being persisted, the same as SetUserPassword.
  rpc CreateUser (CreateUserRequest) returns (common.v1.User);

  // UpdateUser applies a partial update to a user record. Only fields wrapped
  // in a value type (or repeated fields that are non-empty) are applied.
  rpc UpdateUser (UpdateUserRequest) returns (common.v1.User);

  // DeleteUser permanently removes a user record by username. Credentials and
  // access tokens owned by the user are removed along with it (ON DELETE CASCADE).
  rpc DeleteUser (DeleteUserRequest) returns (DeleteUserResponse);

  // AddUserRoles adds one or more roles to a user without affecting existing roles.
  rpc AddUserRoles (UserRolesRequest) returns (common.v1.User);

  // RemoveUserRoles removes one or more roles from a user.
  rpc RemoveUserRoles (UserRolesRequest) returns (common.v1.User);

  // AddUserBlueprints grants a user access to one or more blueprints.
  rpc AddUserBlueprints (UserBlueprintsRequest) returns (common.v1.User);

  // RemoveUserBlueprints revokes access to one or more blueprints from a user.
  rpc RemoveUserBlueprints (UserBlueprintsRequest) returns (common.v1.User);

  // ListUserAuthKeys retrieves all SSH public keys registered for a user, in
  // either normal or digest-only form depending on the request's format field.
  rpc ListUserAuthKeys (ListUserAuthKeysRequest) returns (ListUserAuthKeysResponse);

  // AddUserAuthKeys registers one or more SSH public keys for a user.
  rpc AddUserAuthKeys (UserAuthKeysRequest) returns (common.v1.User);

  // RemoveUserAuthKey removes a single SSH public key from a user, identified
  // by its index in the list returned by ListUserAuthKeys.
  rpc RemoveUserAuthKey (RemoveUserAuthKeyRequest) returns (common.v1.User);

  // SetUserPassword sets or replaces a user's local password, used by AuthUserPassword.
  // The supplied password is bcrypt-hashed server-side before being persisted; it is
  // never stored or returned in plaintext. Pass an empty password to clear it, which
  // disables password auth for the user.
  rpc SetUserPassword (SetUserPasswordRequest) returns (common.v1.User);

  // UpdateUserCredential partially updates a credential by ID. Only fields wrapped in a value
  // type that are set (non-nil) are applied. Credentials whose credential_source matches
  // "idp.k8shell.io/*" — provisioned by the onboarding flow — may only have active updated;
  // attempts to change scope, subject, or secret are rejected.
  rpc UpdateUserCredential (UpdateUserCredentialRequest) returns (UpdateUserCredentialResponse);

  // DeleteUserCredential deletes an external credential by its ID.
  rpc DeleteUserCredential (DeleteUserCredentialRequest) returns (DeleteUserCredentialResponse);

  // RemoveUserCredential removes a specific credential owned by a user, identified by ID.
  rpc RemoveUserCredential (RemoveUserCredentialRequest) returns (RemoveUserCredentialResponse);

  // GetAvailableIdentityProviders returns a list of available identity providers.
  rpc GetAvailableIdentityProviders (GetAvailableIdentityProvidersRequest) returns (GetAvailableIdentityProvidersResponse);

  // CreateAccessToken issues a new Personal Access Token for a user. The raw token is
  // returned once in the response and is not recoverable after that.
  rpc CreateAccessToken (CreateAccessTokenRequest) returns (CreateAccessTokenResponse);

  // ListAccessTokens returns access token metadata (no raw tokens or hashes) for a user.
  rpc ListAccessTokens (Username) returns (ListAccessTokensResponse);

  // RevokeAccessToken soft-deletes an access token by ID, enforcing username ownership.
  rpc RevokeAccessToken (RevokeAccessTokenRequest) returns (RevokeAccessTokenResponse);

  // ResolveAccessToken looks up an access token by its raw value, updates last_used_at,
  // and returns the owning user plus the token's scopes. Called by API gateways
  // on every request that carries a k8sh_ token.
  rpc ResolveAccessToken (ResolveAccessTokenRequest) returns (ResolveAccessTokenResponse);
}

// Messages

// AuthKeyFormat selects how SSH public key material is returned by ListUserAuthKeys.
enum AuthKeyFormat {
  AUTH_KEY_FORMAT_UNSPECIFIED = 0;
  // AUTH_KEY_FORMAT_NORMAL returns the full public key material.
  AUTH_KEY_FORMAT_NORMAL = 1;
  // AUTH_KEY_FORMAT_DIGEST returns only a digest (fingerprint) of the key.
  AUTH_KEY_FORMAT_DIGEST = 2;
}

// ListUserAuthKeysRequest carries the username and desired key format for ListUserAuthKeys.
message ListUserAuthKeysRequest {
  string        username = 1;
  AuthKeyFormat format   = 2;
}

// RemoveUserAuthKeyRequest identifies a single SSH public key to remove from a
// user by its index in the list returned by ListUserAuthKeys.
message RemoveUserAuthKeyRequest {
  string username = 1;
  uint32 index    = 2;
}

// CreateUserRequest carries the fields for creating a new local user record.
// The supplied password, if any, is bcrypt-hashed server-side before being
// persisted; the raw value is never stored or returned.
message CreateUserRequest {
  string          username     = 1;
  string          organization = 2;
  string          fullname     = 3;
  string          email        = 4;
  string          password     = 5;
  repeated string roles        = 6;
  repeated string blueprints   = 7;
  string          shell        = 8;
  bool            sudo         = 9;
  bool            locked       = 10;
  uint32          uid          = 11;
  uint32          gid          = 12;
}

// UpdateUserRequest carries a partial update for a user record.
// Only wrapper-typed fields that are set (non-nil) and repeated fields that
// are non-empty will be applied; unset fields leave the existing value intact.
message UpdateUserRequest {
  string                      username   = 1;
  google.protobuf.StringValue fullname   = 2;
  repeated string             roles      = 3;
  google.protobuf.BoolValue   sudo       = 4;
  repeated string             blueprints = 5;
  google.protobuf.BoolValue   locked     = 6;
  google.protobuf.StringValue org        = 8;
  google.protobuf.StringValue email      = 9;
  google.protobuf.UInt32Value uid        = 10;
  google.protobuf.UInt32Value gid        = 11;
  google.protobuf.StringValue shell      = 12;
}

// DeleteUserRequest identifies the user record to delete by username.
message DeleteUserRequest {
  string username = 1;
}

// DeleteUserResponse indicates whether the deletion was successful.
message DeleteUserResponse {
  bool success = 1;
}

// SetUserPasswordRequest carries a new plaintext password to set for a user.
// The server hashes the password with bcrypt before persisting it; the raw
// value is never stored or returned.
message SetUserPasswordRequest {
  string username = 1;
  string password = 2;
}

// IssueUserTokenRequest carries the username for a token issuance request.
message IssueUserTokenRequest {
  string username = 1;
  string source = 2;
}

// IssueUserTokenResponse carries the newly issued JWT access token.
message IssueUserTokenResponse {
  string user_token = 1;
}

// CompleteUserDeviceFlowRequest is sent by the client after the user has
// authorized the device on the provider side.
message CompleteUserDeviceFlowRequest {
  string provider = 1;
  string username = 2;
}

// CompleteUserDeviceFlowResponse is returned upon successful completion of
// device-flow onboarding.
message CompleteUserDeviceFlowResponse {}

// CompleteUserWebFlowResponse carries the user token issued upon successful completion of the web flow onboarding process.
// pat and cli_state are only populated when create_pat=true was set in the originating OnboardUserWebFlowRequest.
message CompleteUserWebFlowResponse {
  string user_token = 1;
  string pat        = 2;
  string cli_state  = 3;
  string pat_error  = 4; 
}

// ListUserCredentialsRequest lists credentials for a user, optionally
// filtered to a single credential by ID.
message ListUserCredentialsRequest {
  string username = 1;
  uint32 id = 2;
}

// ListUserCredentialsResponse carries all credentials associated with a user.
message ListUserCredentialsResponse {
  repeated common.v1.UserCredential credentials = 1;
}

// GetUserCredentialRequest identifies a specific credential by service name and optional scope.
message GetUserCredentialRequest {
  string username = 1;
  string service_name = 2;
  string service_scope = 3;
}

// AddKubernetesUserCredentialRequest identifies a Kubernetes service-account credential to
// provision for a user. scope maps to the credential's service_scope (the namespace) and
// subject maps to its subject (the service account name).
message AddKubernetesUserCredentialRequest {
  string username = 1;
  string scope    = 2;
  string subject  = 3;
}

// AddKubernetesUserCredentialResponse carries the newly added credential.
message AddKubernetesUserCredentialResponse {
  common.v1.UserCredential credential = 1;
}

// AddGitUserCredentialRequest identifies a Git credential to store for a user. scope maps
// to the credential's service_scope (the git host/repo URL) and subject maps to its subject
// (the git login name). secret is the credential value (e.g. token or password) to store.
message AddGitUserCredentialRequest {
  string username = 1;
  string scope    = 2;
  string subject  = 3;
  string secret   = 4;
}

// AddGitUserCredentialResponse carries the newly added credential.
message AddGitUserCredentialResponse {
  common.v1.UserCredential credential = 1;
}

// AddRegistryUserCredentialRequest identifies a container registry credential to store for a
// user. scope maps to the credential's service_scope (the registry host) and subject maps to
// its subject (the registry login name). secret is the credential value (e.g. token or
// password) to store.
message AddRegistryUserCredentialRequest {
  string username = 1;
  string scope    = 2;
  string subject  = 3;
  string secret   = 4;
}

// AddRegistryUserCredentialResponse carries the newly added credential.
message AddRegistryUserCredentialResponse {
  common.v1.UserCredential credential = 1;
}

// UpdateUserCredentialRequest partially updates a credential identified by id. Only fields
// wrapped in a value type that are set (non-nil) are applied; unset fields leave the existing
// value intact.
message UpdateUserCredentialRequest {
  uint32                      id      = 1;
  google.protobuf.StringValue scope   = 2;
  google.protobuf.StringValue subject = 3;
  google.protobuf.StringValue secret  = 4;
  google.protobuf.BoolValue   active  = 5;
}

// UpdateUserCredentialResponse carries the updated credential.
message UpdateUserCredentialResponse {
  common.v1.UserCredential credential = 1;
}

// DeleteUserCredentialRequest identifies the external credential to delete by its ID.
message DeleteUserCredentialRequest {
  uint32 id = 1;
}

// DeleteUserCredentialResponse indicates whether the deletion was successful.
message DeleteUserCredentialResponse {
  bool success = 1;
}

// RemoveUserCredentialRequest identifies a credential to remove for a user, by ID.
message RemoveUserCredentialRequest {
  string username = 1;
  uint32 id       = 2;
}

// RemoveUserCredentialResponse indicates whether the removal was successful.
message RemoveUserCredentialResponse {
  bool success = 1;
}

// GetAvailableIdentityProvidersRequest is an empty request message to query available identity providers.
message GetAvailableIdentityProvidersRequest {
}

// GetAvailableIdentityProvidersResponse carries the list of available identity providers.
message GetAvailableIdentityProvidersResponse {
  repeated IdentityProviderInfo providers = 1;
}

// CreateAccessTokenRequest carries the parameters for issuing a new access token.
message CreateAccessTokenRequest {
  string                    username   = 1;
  string                    name       = 2;
  repeated string           scopes     = 3;
  google.protobuf.Timestamp expires_at = 4; // omit for non-expiring tokens
}

// CreateAccessTokenResponse carries the newly issued access token. The raw token
// is returned exactly once and cannot be retrieved again.
message CreateAccessTokenResponse {
  int64  id    = 1;
  string token = 2;
}

// ListAccessTokensResponse carries access token metadata for a user (no raw tokens or hashes).
message ListAccessTokensResponse {
  repeated AccessTokenInfo tokens = 1;
}

// RevokeAccessTokenRequest identifies the access token to revoke and asserts ownership.
message RevokeAccessTokenRequest {
  int64  id       = 1;
  string username = 2;
}

// RevokeAccessTokenResponse indicates whether the revocation was successful.
message RevokeAccessTokenResponse {
  bool success = 1;
}

// ResolveAccessTokenRequest carries the raw access token value presented by a client.
message ResolveAccessTokenRequest {
  string                   token  = 1;
  google.protobuf.Duration expiry = 2; // JWT lifetime to issue; omit to use the server default
}

// ResolveAccessTokenResponse carries the owning user, the token's scopes, and a
// freshly issued JWT. The JWT is scoped to the same identity as the PAT and is
// what the API gateway uses for subsequent authz calls — the gateway does not
// need to hold the raw PAT beyond this point.
message ResolveAccessTokenResponse {
  common.v1.User  user       = 1;
  repeated string scopes     = 2;
  string          user_token = 3;
}
