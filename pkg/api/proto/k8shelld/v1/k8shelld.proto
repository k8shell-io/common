syntax = "proto3";

package k8shelld;

option go_package = "github.com/k8shell-io/common/pkg/api/gen/go/k8shelld/v1;k8shelldv1";

// *** Handshake service

service SystemService {
  rpc Handshake (HandshakeRequest) returns (HandshakeResponse);
  rpc SystemInfo (SystemInfoRequest) returns (SystemInfoResponse);
}

// SystemInfo messages
message SystemInfoRequest {}

// SystemInfoResponse message
message SystemInfoResponse {
  string time = 1;
  SystemMetrics system = 2;
  repeated MountUsage mounts = 3;
  DockerUsage docker = 4;
  string repository = 5; 
}

// SystemMetrics message
message SystemMetrics {
  string uptime = 1;
  double cpuUsageMillicores = 2;
  double cpuLimitMillicores = 3;
  double memoryUsageMiB = 4;
  double memLimitMiB = 5;
  double cpuAvg1Min = 6;
  double cpuAvg5Min = 7;
  double cpuAvg15Min = 8;
  uint32 users = 9;
}

// MountUsage message
message MountUsage {
  string mountPoint = 1;
  string source = 2;
  string fsType = 3;
  repeated string options = 4;
  bool readOnly = 5;
  bool isLikelyTemp = 6;
  uint64 totalBytes = 10;
  uint64 usedBytes = 11;
  uint64 freeBytes = 12;
  uint64 availableBytes = 13;
  uint64 totalInodes = 14;
  uint64 freeInodes = 15;
  uint64 declaredSize = 20;
}

// DockerUsage message
message DockerUsage {
  string socketPath = 1;
  string apiVersion = 2;
  string dockerRootDir = 3;
  uint64 imagesBytes = 10;
  uint64 containersBytes = 11;
  uint64 containersRootFsBytes = 12;
  uint64 volumesBytes = 13;
  uint64 buildCacheBytes = 14;
  uint64 totalBytes = 15;
  uint64 declaredSize = 20;
}

// HandshakeRequest message
message HandshakeRequest {
  string client_version = 1;
  string user_token = 2;
}

// HandshakeResponse message
message HandshakeResponse {
  string server_version = 1;
  bool accepted = 2;
  string message = 3;
}

// *** SshService

service SshService {
  // Shell starts a shell session
  rpc Shell (stream ShellRequest) returns (stream ShellResponse);

  // ResizeTerminal resizes the terminal in a shell session
  rpc ResizeTerminal (ResizeTerminalRequest) returns (ResizeTerminalResponse);

  // PortForward forwards a port to the specified destination IP and port
  rpc PortForward (stream PortForwardRequest) returns (stream PortForwardResponse);

  // Exec executes a command
  rpc Exec(stream ExecRequest) returns (stream ExecResponse);

  // UnixSocket reads/writes to a Unix socket in the remote OS
  rpc UnixSocket (stream UnixSocketRequest) returns (stream UnixSocketResponse);

  // GetCWD gets the current working directory for a shell session
  rpc GetCWD (GetCWDRequest) returns (GetCWDResponse);

  // AcquireSession acquires an existing shell session by session ID for attachment.
  // Returns a lock_id on success, or a failure reason if the session does not exist
  // or is already acquired.
  rpc AcquireSession (AcquireSessionRequest) returns (AcquireSessionResponse);

}

// ShellRequest message
message ShellRequest {
  oneof request {
    ShellStartRequest start_request = 1; // Start shell request
    bytes data = 3; // Data to send to the shell
  }
}

// ShellRequest message
message ShellResponse {
  oneof response {
    ShellStartResponse start_response = 1; // Start shell response
    bytes data = 2; // Data received from the shell
    bool terminate = 3; // Terminate the shell session
  }
}

// ShellStartRequest message
message ShellStartRequest {
  string as_user = 1;               // User to run the shell as (empty for default)
  string cmdShell = 2;              // Command to run the shell
  repeated string setEnvVars = 3;   // Environment variables to be set in the the shell
  bool usePty = 4;                  // True to use a pseudo-terminal
  uint32 width = 5;                 // Terminal width
  uint32 height = 6;                // Terminal height
  string container_ref = 7;         // Container ID, name, or Compose service name; empty = local shell
  string lock_id = 8;               // Lock ID from AcquireSession to attach to an existing session
}

// ShellStartResponse message
message ShellStartResponse {
  string pty = 1; // PTY name if a pseudo-terminal is used, empty otherwise
}

// ResizeTerminalRequest message
message ResizeTerminalRequest {
  uint32 width = 2;             // Terminal width
  uint32 height = 3;            // Terminal height
}

// ResizeTerminalResponse message
message ResizeTerminalResponse {
}

// GetCWDRequest message
message GetCWDRequest {
  string shell_id = 1; // Shell session ID
}

// GetCWDResponse message
message GetCWDResponse {
  string path = 1; // Current working directory path
}

// Failure reason for AcquireSession
enum AcquireSessionFailureReason {
  ACQUIRE_SESSION_FAILURE_REASON_UNSPECIFIED    = 0;
  ACQUIRE_SESSION_FAILURE_REASON_NOT_FOUND      = 1; // Session does not exist
  ACQUIRE_SESSION_FAILURE_REASON_ALREADY_ACQUIRED = 2; // Session is already held by another client
}

// AcquireSessionRequest message
message AcquireSessionRequest {
  string session_id = 1; // ID of the shell session to acquire
}

// AcquireSessionResponse message
message AcquireSessionResponse {
  bool    success       = 1; // True if the session was acquired
  string  lock_id       = 2; // Lock ID to use when attaching (only set on success)
  AcquireSessionFailureReason failure_reason = 3; // Reason for failure (only set on failure)
}

// Request for the PortForward operation
message PortForwardRequest {
  oneof request { 
    Destination destination = 1; // Destination details
    bytes data = 2;               // Data to send to the destination
  }
}

// Destination details message
message Destination {
  string ip = 1; // Destination IP address
  uint32 port = 2; // Destination port
}

// Response for the PortForward operation
message PortForwardResponse {
  bytes data = 1;     // Data received from the destination
}

// Request for the Exec operation
message ExecRequest {
  oneof request {
    CommandDetails command_details = 1;  // Command details including command and shell binary
    bytes input = 2;                     // Input to send to the command
    string signal = 3;                   // Signal to send to the command
  }
}

// Response for the Exec operation
message ExecResponse {
  oneof response {
    bytes stdout = 1;    // Standard output
    bytes stderr = 2;    // Standard error
    int32 exit_code = 3; // Exit code when the process exits
  }
}

// Command details message
message CommandDetails {
  string as_user = 1;      // User to run the command as (empty for default)
  string command = 2;       // Initial command with arguments
  string shell_binary = 3;  // Optional shell binary to use (e.g., "/bin/sh"), empty for none
  repeated string env_vars = 4;   // Environment variables to be set for the command
}

// Request for the UnixSocket operation
message UnixSocketRequest {
  oneof request {
    UnixSocketStartRequest start_request = 1; // Start Unix socket request
    bytes data = 2; // Data to send to the Unix socket
  }
}

// Response for the UnixSocket operation
message UnixSocketResponse {
  bytes data = 1; // Data to send to the Unix socket
}

// Mode for Unix socket operation
enum UnixSocketMode {
  UNIX_SOCKET_MODE_LISTEN = 0;      
  UNIX_SOCKET_MODE_DIAL = 1;        
}

// UnixSocketStartRequest message
message UnixSocketStartRequest {
  UnixSocketMode mode = 1; 
  string socketPath = 2;            
}

// *** CommandService

service CommandService {
  rpc CommandListener (stream CommandMessage) returns (stream CommandMessage);
}

message CommandMessage {
  string command_id = 1;

  oneof payload {
    string      command = 2; 
    string      reply   = 3; 
  }
}

// *** AppService

service AppService {
  // List all apps and their status
  rpc ListApps (ListAppsRequest) returns (ListAppsResponse);

  // Install an app (optionally force reinstall)
  rpc InstallApp (InstallAppRequest) returns (InstallAppResponse);

  // Start an app
  rpc StartApp (StartAppRequest) returns (StartAppResponse);

  // Stop an app
  rpc StopApp (StopAppRequest) returns (StopAppResponse);

  // unary: return whole log as a single string
  rpc GetLogs (GetLogsRequest) returns (GetLogsResponse);

  // streaming: tail logs line by line
  rpc GetLogsStream (GetLogsStreamRequest) returns (stream GetLogsStreamResponse);
}

// Which log to return
enum LogType {
  LOG_TYPE_APP = 0;      // runtime app log
  LOG_TYPE_INSTALL = 1;  // install log
}

message ListAppsRequest {}

message ListAppsResponse {
  repeated AppStatus apps = 1;
}

message AppStatus {
  string name = 1;
  string status = 2;
  string version = 3;
  int32  port = 4;
  int32  pid = 5;
  string age = 6;
  int32  restarts = 7;
  string protocol = 8;
}

message InstallAppRequest {
  string name = 1;
  bool   force = 2;
}

message InstallAppResponse {}

message StartAppRequest {
  string name = 1;
}

message StartAppResponse {}

message StopAppRequest {
  string name = 1;
}

message StopAppResponse {}

message GetLogsRequest {
  string  name = 1;
  LogType type = 2; 
}

message GetLogsResponse {
  string log = 1;
}

message GetLogsStreamRequest {
  string  name   = 1;
  LogType type   = 2;
}

message GetLogsStreamResponse {
  string line = 1; 
}