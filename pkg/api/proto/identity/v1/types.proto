syntax = "proto3";

package identity.v1;

option go_package = "github.com/k8shell-io/common/pkg/api/gen/go/identity/v1;identityv1";

import "common/v1/common.proto";
import "google/protobuf/timestamp.proto";

// Username carries a single username identifier.
message Username {
  string username = 1;
}

// UserStr carries a raw user string, which may encode username, organization, or other attributes.
message UserStr {
  string userstr = 1;
}

// Blueprint carries a raw blueprint definition and the address of its source repository.
message Blueprint {
  // blueprint holds the raw blueprint content.
  bytes  blueprint    = 1;
  // repo_address is the URL or address of the repository that owns this blueprint.
  string repo_address = 2;
}

// UserList holds a paginated list of users.
message UserList {
  repeated common.v1.User users = 1;
}

// FindUserRequest looks up a user by username or access token.
message FindUserRequest {
  string username = 1;
}

// GetUsersRequest carries pagination parameters, plus optional filters
// sourced from the user:list authz obligations (see pkg/authz/user.go),
// for listing users.
message GetUsersRequest {
  int32 limit  = 1;
  int32 offset = 2;

  // Optional filters applied before limit/offset, as an AND-of-ORs: a user
  // must match every filter field that is set, and a repeated field matches
  // when the user has at least one of the listed values. An unset/empty
  // field imposes no restriction on that dimension.
  repeated string roles      = 3; // user must have at least one of these roles
  repeated string blueprints = 4; // user must have at least one of these blueprints
  string          org        = 5; // user must belong to this organization
}

// GetUsersResponse carries the paginated list of users.
message GetUsersResponse {
  repeated common.v1.User users = 1;
}

// AuthUserPublicKeyRequest carries the credentials for SSH public key authentication.
message AuthUserPublicKeyRequest {
  string username   = 1;
  string public_key = 2;
}

// AuthUserPasswordRequest carries the credentials for password authentication.
// The password is transmitted in plaintext over the (TLS-secured) gRPC channel
// and compared against the bcrypt hash stored for the user; it is never persisted.
message AuthUserPasswordRequest {
  string username = 1;
  string password = 2;
}

// AuthUserResponse carries the result of an authentication attempt.
message AuthUserResponse {
  bool            valid = 1;
  common.v1.User  user  = 2;
}

// OnboardUserDeviceFlowRequest initiates a device-flow onboarding session for the given provider.
message OnboardUserDeviceFlowRequest {
  string provider     = 1;
  string username     = 2;
}

// OnboardUserWebFlowRequest initiates a web-flow onboarding session for the given provider.
message OnboardUserWebFlowRequest {
  string provider     = 1;
  string redirect_uri = 2;
  string cli_state    = 3;
  bool   create_pat   = 4;
}

// CompleteUserWebFlowRequest carries the OAuth state and authorization code to finalize web-flow onboarding.
message CompleteUserWebFlowRequest {
  string state = 1;
  string code  = 2;
}

// RepoPullRequestRequest identifies a pull request within a repository for a given user.
message RepoPullRequestRequest {
  string username            = 1;
  string repo_owner          = 2;
  string repo_name           = 3;
  int32  pull_request_number = 4;
}

// RepoRefResponse carries the resolved repository reference for a pull request.
message RepoRefResponse {
  string repo_ref = 1;
}

// IdentityProviderInfo carries data about the identity provider
message IdentityProviderInfo {
  string          name         = 1;
  repeated string capabilities = 2;
}

// UserRolesRequest carries a username and one or more roles to add or remove.
message UserRolesRequest {
  string          username = 1;
  repeated string roles    = 2;
}

// UserBlueprintsRequest carries a username and one or more blueprints to grant or revoke.
message UserBlueprintsRequest {
  string          username   = 1;
  repeated string blueprints = 2;
}

// UserAuthKeysRequest carries a username and one or more SSH public keys to register or remove.
message UserAuthKeysRequest {
  string          username  = 1;
  repeated string auth_keys = 2;
}

// AccessTokenInfo carries access token metadata returned in list responses.
// The raw token and its hash are never included.
message AccessTokenInfo {
  int64                     id           = 1;
  string                    username     = 2;
  string                    name         = 3;
  repeated string           scopes       = 4;
  google.protobuf.Timestamp expires_at   = 5;
  google.protobuf.Timestamp created_at   = 6;
  google.protobuf.Timestamp last_used_at = 7;
  bool                      is_active    = 8;
}