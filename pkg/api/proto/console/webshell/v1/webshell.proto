syntax = "proto3";

package webshell.v1;

option go_package = "github.com/k8shell-io/common/pkg/api/gen/go/console/webshell/v1;webshellv1";

// WebShellMessage is the top-level message that can contain any of the other message types as its payload.
message WebShellMessage {
    oneof payload {
        PingMessage ping = 1;
        PongMessage pong = 2;
        TerminalInputMessage terminal_input = 3;
        TerminalOutputMessage terminal_output = 4;
        TerminalResizeMessage terminal_resize = 5;
        GetCWDMessage get_cwd_message = 6;
        GetCWDResponse get_cwd_response = 7;
        TerminalErrorMessage terminal_error = 8;
    }
}

// PingMessage is sent by the client to keep the connection alive
message PingMessage {}

// PongMessage is sent by the server in response to a PingMessage
message PongMessage {}

// TerminalInputMessage is sent by the client when the user types in the terminal
message TerminalInputMessage {
    string data = 1;
}

// TerminalOutputMessage is sent by the server to the client when there is output from the terminal
message TerminalOutputMessage {
    string data = 1;
}

// TerminalErrorMessage is sent by the server to the client when there is an error in the terminal
message TerminalErrorMessage {
    string data = 1;
}

// TerminalResizeMessage is sent by the client when the terminal is resized
message TerminalResizeMessage {
    uint32 cols = 1;
    uint32 rows = 2;
}

// GetCWDMessage is sent by the client to request the current working directory of the terminal session.
message GetCWDMessage {
}

// GetCWDResponse is sent by the server in response to a GetCWDMessage, containing the current working directory path.
message GetCWDResponse {
    string path = 1; // Current working directory path
    optional string error = 2; // Error message if the request failed, empty if successful
}