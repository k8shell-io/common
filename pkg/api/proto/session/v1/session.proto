syntax = "proto3";

package session;

option go_package = "github.com/k8shell-io/common/pkg/api/gen/go/session/v1;sessionv1";

// *** Session service

service SessionService {
  rpc GetSessions (GetSessionsRequest) returns (Sessions);
}

// GetSessionsRequest message
message GetSessionsRequest {
  string session_id = 1;
  string username = 2;
  string workspace = 3;
  int32 limit = 4;
  int32 offset = 5;
  bool reverse = 6;
}

// Session message
message Session {
  string session_id = 1;
  string username = 2;
  string k8shelld_ver = 3;
  string client = 4;
  string client_ip = 5;
  int64 start_time = 6;  
  int64 end_time = 7;    
  string workspace = 8;
  int64 bytes_in = 9;
  int64 bytes_out = 10;
  repeated string channels = 11;
  string blueprint = 12;
  int64 updated_at = 13; 
}

// Sessions wrapper for returning multiple Session messages
message Sessions {
  repeated Session sessions = 1;
}


