syntax = "proto3";

package common;

option go_package = "github.com/k8shell-io/common/pkg/gapi/commonpb;commonpb";

import "google/protobuf/timestamp.proto";

message User {
  string username = 1;
  string organization = 2;
  bool is_valid = 3;
  google.protobuf.Timestamp expires_at = 4;
  uint32 uid = 5;
  uint32 gid = 6;
  string fullname = 7;
  string email = 9;
  string password = 10;
  repeated string auths = 11;
  repeated string auth_keys = 12;
  bool locked = 13;
  repeated string envs = 16;
  repeated string roles = 17;
  repeated string blueprints = 18;
  string source = 19;
}

message ExternalCredential {
    uint32 id = 1;
    string username = 2;
    string service_name = 3;
    string service_url = 4;
    string external_id = 5;
    string external_token = 6;
}

message OnboardUserDeviceFlow {
  string provider = 1;
  string username = 2;
  string user_code = 3;
  string verification_url = 4;
  int32 expires_in = 5;
}

message OnboardUserWebFlow {
  string provider = 1;
  string auth_url = 2;
  string state = 3;
  int32 expires_in = 4;
}

message CompleteUserWebFlow {
  string code = 2;
  string state = 3;
}

message UserOnboardCapability {
  string provider = 1;
  string username = 2;
  bool can_onboard = 3;
}

// PodStatus represents the status of a workspace pod
message PodStatus {
  google.protobuf.Timestamp created = 1;
  string status = 2;
  string message = 3;
  int32 restarts = 4;
  string last_fail_message = 5;
}

// WorkspaceDetails represents the details of a workspace
message WorkspaceDetails {
  PodStatus pod_status = 1;
  string app_version = 2;
  string name = 3;
  string username = 4;
  string organization = 5;
  string repo_owner = 6;
  string repo_name = 7;
  string repo_ref = 8;
  string blueprint = 9;
  string server_name = 10;
  string pod_ip = 11;
  int32 port = 12;
  bool tls_enabled = 13;
  string splash = 14;
  string cpu = 15;
  string memory = 16;
  string hostname = 17;
  string job_id = 18;
}

message BlueprintSummary {
  string name = 1;
  string description = 2;
  bool is_template = 3;
}
