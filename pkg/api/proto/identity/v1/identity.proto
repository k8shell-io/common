syntax = "proto3";

package identity.v1;

option go_package = "github.com/k8shell-io/common/pkg/api/gen/go/identity/v1;identityv1";

import "common/v1/common.proto";
import "identity/v1/types.proto";

// IdentityService provides operations for user management, authentication,
// onboarding, and external credential management.
service IdentityService {
  // FindUser retrieves a user by username. It can be used for authentication and user lookup.
  rpc FindUser (FindUserRequest) returns (common.v1.User);

  // GetUsers retrieves a list of users with pagination support.
  rpc GetUsers (GetUsersRequest) returns (UserList);

  // GetUserAccessToken returns the current JWT access token for a user.
  rpc GetUserAccessToken (GetUserAccessTokenRequest) returns (GetUserAccessTokenResponse);

  // GetUserOnboardCapability checks if the identity provider supports onboarding and returns the capability details.
  rpc GetUserOnboardCapability (Username) returns (common.v1.UserOnboardCapability);

  // OnboardUserDeviceFlow initiates the device flow onboarding process for a user.
  rpc OnboardUserDeviceFlow (OnboardUserDeviceFlowRequest) returns (common.v1.OnboardUserDeviceFlow);

  // OnboardUserWebFlow initiates the web flow onboarding process for a user.
  rpc OnboardUserWebFlow (OnboardUserWebFlowRequest) returns (common.v1.OnboardUserWebFlow);

  // CompleteUserWebFlow completes the web flow onboarding process using the provided state and code.
  rpc CompleteUserWebFlow (CompleteUserWebFlowRequest) returns (common.v1.User);

  // AuthUserPublicKey authenticates a user using a public key and returns the authentication result
  // along with user details if valid.
  rpc AuthUserPublicKey (AuthUserPublicKeyRequest) returns (AuthUserResponse);

  // GetBlueprintByUserStr retrieves a blueprint associated with a user string identifier.
  rpc GetBlueprintByUserStr (UserStr) returns (Blueprint);

  // ResolvePullRequestToRef resolves a pull request to a repository reference (e.g., branch or commit).
  rpc ResolvePullRequestToRef (RepoPullRequestRequest) returns (RepoRefResponse);

  // GetUserCredentials retrieves all external credentials associated with a user.
  rpc GetUserCredentials (Username) returns (GetUserCredentialsResponse);

  // AddUserCredential adds a new external credential for a user.
  rpc AddUserCredential (common.v1.ExternalCredential) returns (AddUserCredentialResponse);

  // UpdateUserCredential updates an existing external credential for a user.
  rpc UpdateUserCredential (common.v1.ExternalCredential) returns (UpdateUserCredentialResponse);

  // DeleteUserCredential deletes an external credential by its ID.
  rpc DeleteUserCredential (DeleteUserCredentialRequest) returns (DeleteUserCredentialResponse);
}

// Messages

// GetUserAccessTokenRequest carries the username for a token retrieval request.
message GetUserAccessTokenRequest {
  string username = 1;
}

// GetUserAccessTokenResponse carries the JWT access token for the requested user.
message GetUserAccessTokenResponse {
  string access_token = 1;
}

// GetUserCredentialsResponse carries all external credentials associated with a user.
message GetUserCredentialsResponse {
  repeated common.v1.ExternalCredential credentials = 1;
}

// AddUserCredentialResponse carries the newly added external credential.
message AddUserCredentialResponse {
  common.v1.ExternalCredential credential = 1;
}

// UpdateUserCredentialResponse carries the updated external credential.
message UpdateUserCredentialResponse {
  common.v1.ExternalCredential credential = 1;
}

// DeleteUserCredentialRequest identifies the external credential to delete by its ID.
message DeleteUserCredentialRequest {
  uint32 id = 1;
}

// DeleteUserCredentialResponse indicates whether the deletion was successful.
message DeleteUserCredentialResponse {
  bool success = 1;
}
