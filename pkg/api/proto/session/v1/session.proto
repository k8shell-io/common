syntax = "proto3";

package session.v1;

option go_package = "github.com/k8shell-io/common/pkg/api/gen/go/session/v1;sessionv1";

import "google/protobuf/empty.proto";

// SessionService manages SSH session records.
service SessionService {
  // GetSessions returns sessions matching the given filter criteria.
  rpc GetSessions(GetSessionsRequest) returns (Sessions);

  // UpsertSession creates or updates a session record.
  // If a session with the given session_id already exists it is updated,
  // otherwise a new record is created.
  rpc UpsertSession(UpsertSessionRequest) returns (UpsertSessionResponse);

  // EndSession marks a session as ended, recording its final byte counts
  // and end time.
  rpc EndSession(EndSessionRequest) returns (google.protobuf.Empty);
}

// GetSessionsRequest filters the list of sessions to return.
// All fields are optional; omitting a field disables that filter.
message GetSessionsRequest {
  // session_id filters by exact session identifier.
  string session_id = 1;
  // username filters by the owning user.
  string username = 2;
  // workspace filters by the workspace name.
  string workspace = 3;
  // limit caps the number of returned sessions. 0 means no limit.
  int32 limit = 4;
  // offset skips the first N results for pagination.
  int32 offset = 5;
  // reverse returns results in reverse chronological order when true.
  bool reverse = 6;
}

// Session represents a single SSH session record.
message Session {
  // session_id is the unique identifier for this session.
  string session_id = 1;
  // username is the user that owns this session.
  string username = 2;
  // k8shelld_ver is the version of k8shelld that handled this session.
  string k8shelld_ver = 3;
  // client is the SSH client identifier string.
  string client = 4;
  // client_ip is the remote IP address of the SSH client.
  string client_ip = 5;
  // start_time is the session start time as a Unix timestamp (seconds).
  int64 start_time = 6;
  // end_time is the session end time as a Unix timestamp (seconds).
  // Zero means the session is still active.
  int64 end_time = 7;
  // workspace is the name of the workspace this session is attached to.
  string workspace = 8;
  // bytes_in is the total number of bytes received from the client.
  int64 bytes_in = 9;
  // bytes_out is the total number of bytes sent to the client.
  int64 bytes_out = 10;
  // channels lists the SSH channels opened during this session.
  repeated string channels = 11;
  // blueprint is the blueprint used by the session's workspace.
  string blueprint = 12;
  // updated_at is the time the record was last updated, as a Unix timestamp (seconds).
  int64 updated_at = 13;
}

// Sessions is a list of session records.
message Sessions {
  repeated Session sessions = 1;
}

// UpsertSessionRequest carries the full session record to create or update.
message UpsertSessionRequest {
  // session is the session data to persist.
  Session session = 1;
}

// UpsertSessionResponse carries the persisted session record after upsert.
message UpsertSessionResponse {
  // session is the session as stored, reflecting any server-side defaults.
  Session session = 1;
}

// EndSessionRequest closes an active session and records its final stats.
message EndSessionRequest {
  // session_id identifies the session to end.
  string session_id = 1;
  // end_time is the session end time as a Unix timestamp (seconds).
  int64 end_time = 2;
  // bytes_in is the final total bytes received from the client.
  int64 bytes_in = 3;
  // bytes_out is the final total bytes sent to the client.
  int64 bytes_out = 4;
}

// *** Recording

// Direction indicates which side of the channel produced the data.
enum Direction {
  // DIRECTION_OUTPUT is data flowing from the workspace to the client
  // (server stdout / terminal output).
  DIRECTION_OUTPUT = 0;
  // DIRECTION_INPUT is data flowing from the client to the workspace.
  // Only recorded when explicitly enabled.
  DIRECTION_INPUT = 1;
}

// RecordingService accepts client-streaming recording frames from k8shelld
// and persists them for later playback. Each RPC corresponds to a distinct
// SSH channel type with its own typed header and frame set.
service RecordingService {
  // StreamShellRecording records a PTY shell session. The first frame must
  // be a ShellRecordingHeader; subsequent frames carry data chunks or
  // terminal resize events.
  rpc StreamShellRecording(stream ShellRecordingFrame) returns (google.protobuf.Empty);

  // StreamExecRecording records a non-PTY exec channel. The first frame must
  // be an ExecRecordingHeader; subsequent frames carry data chunks.
  rpc StreamExecRecording(stream ExecRecordingFrame) returns (google.protobuf.Empty);

  // StreamTcpipRecording records a direct-tcpip port-forward channel. The
  // first frame must be a TcpipRecordingHeader; subsequent frames carry data chunks.
  rpc StreamTcpipRecording(stream TcpipRecordingFrame) returns (google.protobuf.Empty);
}

// *** Shared recording types

// DataChunk carries a block of raw channel data with timing information.
message DataChunk {
  // time_offset_ms is the number of milliseconds elapsed since the recording started_at.
  int64 time_offset_ms = 1;
  // data is the raw bytes transferred on the channel.
  bytes data = 2;
  // direction indicates which side produced this data.
  Direction direction = 3;
}

// TerminalResize records a PTY window-change event.
message TerminalResize {
  // time_offset_ms is the number of milliseconds elapsed since the recording started_at.
  int64 time_offset_ms = 1;
  // width is the new terminal width in columns.
  uint32 width = 2;
  // height is the new terminal height in rows.
  uint32 height = 3;
}

// *** Shell recording

// ShellRecordingHeader is the mandatory first frame of a shell recording stream.
message ShellRecordingHeader {
  // session_id ties this recording to a SessionService session record.
  string session_id = 1;
  // username is the owner of the session being recorded.
  string username = 2;
  // started_at is the channel start time as a Unix timestamp (seconds).
  int64 started_at = 3;
  // width is the initial terminal width in columns.
  uint32 width = 4;
  // height is the initial terminal height in rows.
  uint32 height = 5;
}

// ShellRecordingFrame is a single unit in a shell recording stream.
message ShellRecordingFrame {
  oneof payload {
    // header is the first frame and carries PTY session metadata.
    ShellRecordingHeader header = 1;
    // chunk carries a block of raw terminal data.
    DataChunk chunk = 2;
    // resize carries a terminal window-change event.
    TerminalResize resize = 3;
  }
}

// *** Exec recording

// ExecRecordingHeader is the mandatory first frame of an exec recording stream.
message ExecRecordingHeader {
  // session_id ties this recording to a SessionService session record.
  string session_id = 1;
  // username is the owner of the session being recorded.
  string username = 2;
  // started_at is the channel start time as a Unix timestamp (seconds).
  int64 started_at = 3;
  // command is the command that was executed.
  string command = 4;
}

// ExecRecordingFrame is a single unit in an exec recording stream.
message ExecRecordingFrame {
  oneof payload {
    // header is the first frame and carries exec session metadata.
    ExecRecordingHeader header = 1;
    // chunk carries a block of raw stdout/stderr data.
    DataChunk chunk = 2;
  }
}

// *** Direct-tcpip recording

// TcpipRecordingHeader is the mandatory first frame of a direct-tcpip recording stream.
message TcpipRecordingHeader {
  // session_id ties this recording to a SessionService session record.
  string session_id = 1;
  // username is the owner of the session being recorded.
  string username = 2;
  // started_at is the channel start time as a Unix timestamp (seconds).
  int64 started_at = 3;
  // src_host is the originating host of the port-forward request.
  string src_host = 4;
  // src_port is the originating port of the port-forward request.
  uint32 src_port = 5;
  // dst_host is the destination host of the port-forward request.
  string dst_host = 6;
  // dst_port is the destination port of the port-forward request.
  uint32 dst_port = 7;
}

// TcpipRecordingFrame is a single unit in a direct-tcpip recording stream.
message TcpipRecordingFrame {
  oneof payload {
    // header is the first frame and carries port-forward metadata.
    TcpipRecordingHeader header = 1;
    // chunk carries a block of raw forwarded data.
    DataChunk chunk = 2;
  }
}

